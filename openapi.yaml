openapi: 3.1.0
info:
  title: KORION KORI Backend API
  version: 0.1.0
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/system/status:
    get:
      summary: Get runtime status and stored monitoring summary
      security:
        - WithdrawAdminApiKey: []
      responses:
        '200':
          description: System status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/monitoring/run:
    post:
      summary: Run one monitoring collection cycle now
      security:
        - WithdrawAdminApiKey: []
      responses:
        '200':
          description: Monitoring cycle result
          content:
            application/json:
              schema:
                type: object
                properties:
                  run:
                    $ref: '#/components/schemas/CollectorRun'
                  status:
                    $ref: '#/components/schemas/SystemStatusResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/deposit-monitor:
    get:
      summary: Get foxya-linked automatic deposit monitor status
      security:
        - WithdrawAdminApiKey: []
      responses:
        '200':
          description: Deposit monitor status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepositMonitorStatus'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/deposit-monitor/run:
    post:
      summary: Run one automatic deposit monitor cycle now
      security:
        - WithdrawAdminApiKey: []
      responses:
        '200':
          description: Deposit monitor cycle result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    oneOf:
                      - $ref: '#/components/schemas/DepositMonitorCycleResult'
                      - type: object
                        properties:
                          skipped:
                            type: boolean
                          reason:
                            type: string
                  status:
                    $ref: '#/components/schemas/DepositMonitorStatus'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/sweep-bot:
    get:
      summary: Get automatic sweep bot status
      security:
        - WithdrawAdminApiKey: []
      responses:
        '200':
          description: Sweep bot status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SweepBotStatus'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/sweep-bot/run:
    post:
      summary: Run one automatic sweep bot cycle now
      security:
        - WithdrawAdminApiKey: []
      responses:
        '200':
          description: Sweep bot cycle result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    oneOf:
                      - $ref: '#/components/schemas/SweepBotCycleResult'
                      - type: object
                        properties:
                          skipped:
                            type: boolean
                          reason:
                            type: string
                  status:
                    $ref: '#/components/schemas/SweepBotStatus'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/alerts/telegram/test:
    post:
      summary: Send a test Telegram alert
      security:
        - WithdrawAdminApiKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  maxLength: 2000
                  description: Optional message body to send instead of the default test text.
      responses:
        '200':
          description: Telegram test dispatch result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  telegramEnabled:
                    type: boolean
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/external-alert-monitor:
    get:
      summary: Get external alert monitor status
      security:
        - WithdrawAdminApiKey: []
      responses:
        '200':
          description: External alert monitor status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalAlertMonitorStatus'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/external-alert-monitor/run:
    post:
      summary: Run external alert monitor once
      security:
        - WithdrawAdminApiKey: []
      responses:
        '200':
          description: External alert monitor cycle result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    oneOf:
                      - type: object
                        properties:
                          startedAt:
                            type: string
                          checkedTargets:
                            type: integer
                          alertedEvents:
                            type: integer
                          initializedCursors:
                            type: integer
                      - type: object
                        properties:
                          skipped:
                            type: boolean
                          reason:
                            type: string
                  status:
                    $ref: '#/components/schemas/ExternalAlertMonitorStatus'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/runtime-profile:
    post:
      summary: Switch active contract profile for sandbox runtime
      description: Available only when runtime profile switching is enabled by environment configuration.
      security:
        - WithdrawAdminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeProfileRequest'
      responses:
        '200':
          description: Updated system status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/audit-logs:
    get:
      summary: List persisted audit logs
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: query
          name: entityType
          required: false
          schema:
            type: string
            enum: [withdrawal, sweep, system]
        - in: query
          name: entityId
          required: false
          schema:
            type: string
        - in: query
          name: actorId
          required: false
          schema:
            type: string
        - in: query
          name: action
          required: false
          schema:
            type: string
        - in: query
          name: createdFrom
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: createdTo
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Audit log list
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/audit-logs/export:
    get:
      summary: Export persisted audit logs as CSV
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: query
          name: entityType
          required: false
          schema:
            type: string
            enum: [withdrawal, sweep, system]
        - in: query
          name: entityId
          required: false
          schema:
            type: string
        - in: query
          name: actorId
          required: false
          schema:
            type: string
        - in: query
          name: action
          required: false
          schema:
            type: string
        - in: query
          name: createdFrom
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: createdTo
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Audit log CSV export
          content:
            text/csv:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/outbox:
    get:
      summary: List outbox publisher status and recent events
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Outbox status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxStatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/monitoring/history:
    get:
      summary: List wallet monitoring history points for time-series analysis
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: query
          name: walletCodes
          required: false
          schema:
            type: string
          description: Comma-separated wallet codes
        - in: query
          name: createdFrom
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: createdTo
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2000
      responses:
        '200':
          description: Wallet monitoring history
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/WalletMonitoringHistoryPoint'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/outbox/replay:
    post:
      summary: Replay dead-lettered outbox events
      security:
        - WithdrawAdminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplayOutboxRequest'
      responses:
        '200':
          description: Dead-letter replay result
          content:
            application/json:
              schema:
                type: object
                properties:
                  replayedCount:
                    type: integer
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/outbox/recover-processing:
    post:
      summary: Recover stale processing outbox events back to pending
      security:
        - WithdrawAdminApiKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoverOutboxProcessingRequest'
      responses:
        '200':
          description: Processing recovery result
          content:
            application/json:
              schema:
                type: object
                properties:
                  recoveredCount:
                    type: integer
                  timeoutSec:
                    type: integer
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/outbox/dead-letter/ack:
    post:
      summary: Acknowledge dead-lettered outbox events for operator triage
      security:
        - WithdrawAdminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcknowledgeOutboxDeadLetterRequest'
      responses:
        '200':
          description: Dead-letter acknowledgement result
          content:
            application/json:
              schema:
                type: object
                properties:
                  acknowledgedCount:
                    type: integer
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/withdraw-jobs/external-sync/retry:
    post:
      summary: Requeue foxya withdrawal callback sync jobs for specific withdrawals
      security:
        - WithdrawAdminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [withdrawalIds]
              properties:
                withdrawalIds:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: External sync retry queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      queuedCount:
                        type: integer
                      withdrawalIds:
                        type: array
                        items:
                          type: string
                          format: uuid
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/withdraw-jobs/external-sync/failures:
    get:
      summary: List recent foxya withdrawal callback sync failures for retry tooling
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: External sync failure list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        withdrawalId:
                          type: string
                          format: uuid
                        createdAt:
                          type: string
                        status:
                          type: string
                        error:
                          type: string
                        occurredAt:
                          type: string
                        txHash:
                          type: string
                        failedJob:
                          nullable: true
                          type: object
                          properties:
                            attemptsMade:
                              type: integer
                            failedReason:
                              type: string
                  failedJobCount:
                    type: integer
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/withdraw-policies/addresses:
    get:
      summary: List withdrawal destination address policies for ops tooling
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: query
          name: address
          required: false
          schema:
            type: string
            pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        - in: query
          name: policyType
          required: false
          schema:
            type: string
            enum: [blacklist, whitelist, internal_blocked]
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Withdrawal address policy list
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies:
                    type: array
                    items:
                      $ref: '#/components/schemas/WithdrawAddressPolicy'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    post:
      summary: Create or update a withdrawal destination address policy from ops tooling
      security:
        - WithdrawAdminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawAddressPolicyUpsertRequest'
      responses:
        '201':
          description: Withdrawal address policy upserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy:
                    $ref: '#/components/schemas/WithdrawAddressPolicy'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/withdraw-policies/addresses/{address}/{policyType}:
    delete:
      summary: Delete a withdrawal destination address policy from ops tooling
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
            pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        - in: path
          name: policyType
          required: true
          schema:
            type: string
            enum: [blacklist, whitelist, internal_blocked]
      responses:
        '200':
          description: Withdrawal address policy deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/withdraw-risk-events:
    get:
      summary: List recorded withdrawal risk events for operator review
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Withdrawal risk event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/WithdrawRiskEvent'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    post:
      summary: Record a withdrawal risk event and optionally materialize a blacklist policy
      security:
        - WithdrawAdminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawRiskEventCreateRequest'
      responses:
        '201':
          description: Withdrawal risk event recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  event:
                    $ref: '#/components/schemas/WithdrawRiskEvent'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/reconciliation:
    get:
      summary: Get internal ledger versus on-chain reconciliation summary
      security:
        - WithdrawAdminApiKey: []
      responses:
        '200':
          description: Reconciliation summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationReport'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/network-fees:
    get:
      summary: List recorded on-chain network fee receipts for withdrawals and sweeps
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: query
          name: referenceType
          required: false
          schema:
            type: string
            enum: [withdrawal, sweep]
        - in: query
          name: referenceId
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Network fee receipts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkFeeReceiptListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/network-fees/daily-snapshots:
    get:
      summary: List daily reconciliation snapshots comparing fee journals and actual network fee receipts
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: query
          name: days
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
      responses:
        '200':
          description: Daily network fee reconciliation snapshots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkFeeDailySnapshotListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/sweeps:
    get:
      summary: List planned and executed sweep records
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Sweep list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sweeps:
                    type: array
                    items:
                      $ref: '#/components/schemas/SweepRecord'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/sweeps/plan:
    post:
      summary: Plan sweep records from latest monitoring snapshots
      security:
        - WithdrawAdminApiKey: []
      responses:
        '200':
          description: Sweep planning result
          content:
            application/json:
              schema:
                type: object
                properties:
                  plannedCount:
                    type: integer
                  sweeps:
                    type: array
                    items:
                      $ref: '#/components/schemas/SweepRecord'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/sweeps/{sweepId}/broadcast:
    post:
      summary: Mark a sweep as broadcasted with manual tx hash
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: path
          name: sweepId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SweepTransitionRequest'
      responses:
        '200':
          description: Sweep broadcasted
          content:
            application/json:
              schema:
                type: object
                properties:
                  sweep:
                    $ref: '#/components/schemas/SweepRecord'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/sweeps/{sweepId}/confirm:
    post:
      summary: Mark a sweep as confirmed
      security:
        - WithdrawAdminApiKey: []
      parameters:
        - in: path
          name: sweepId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SweepTransitionRequest'
      responses:
        '200':
          description: Sweep confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  sweep:
                    $ref: '#/components/schemas/SweepRecord'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/onchain/networks/{network}/wallets/{address}/balance:
    get:
      summary: Lookup on-chain TRX and KORI balance for any address on mainnet or testnet
      parameters:
        - in: path
          name: network
          required: true
          schema:
            type: string
            enum: [mainnet, testnet]
        - in: path
          name: address
          required: true
          schema:
            type: string
            pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
      responses:
        '200':
          description: On-chain balance lookup response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnchainBalanceResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/onchain/networks/{network}/transfers:
    post:
      summary: Send KORI directly from hot wallet on the selected network
      parameters:
        - in: path
          name: network
          required: true
          schema:
            type: string
            enum: [mainnet, testnet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnchainTransferRequest'
      responses:
        '201':
          description: On-chain hot wallet transfer accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnchainTransferResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/deposits/scan:
    post:
      summary: Process detected deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositScanRequest'
      responses:
        '201':
          description: Created
        '200':
          description: Duplicate request
        '202':
          description: Ignored because destination wallet is not tracked
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/wallets/address-binding:
    post:
      summary: Bind a wallet address to a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletBindingRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  binding:
                    $ref: '#/components/schemas/WalletBinding'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
    get:
      summary: Lookup wallet binding by userId or walletAddress
      parameters:
        - in: query
          name: userId
          required: false
          schema:
            type: string
        - in: query
          name: walletAddress
          required: false
          schema:
            type: string
            pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
      responses:
        '200':
          description: Wallet binding lookup response
          content:
            application/json:
              schema:
                type: object
                properties:
                  binding:
                    oneOf:
                      - $ref: '#/components/schemas/WalletBinding'
                      - type: 'null'
