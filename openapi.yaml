openapi: 3.1.0
info:
  title: KORION KORI Backend API
  version: 0.1.0
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/system/status:
    get:
      summary: Get runtime status and stored monitoring summary
      responses:
        '200':
          description: System status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
  /api/system/monitoring/run:
    post:
      summary: Run one monitoring collection cycle now
      responses:
        '200':
          description: Monitoring cycle result
          content:
            application/json:
              schema:
                type: object
                properties:
                  run:
                    $ref: '#/components/schemas/CollectorRun'
                  status:
                    $ref: '#/components/schemas/SystemStatusResponse'
  /api/system/deposit-monitor:
    get:
      summary: Get foxya-linked automatic deposit monitor status
      responses:
        '200':
          description: Deposit monitor status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepositMonitorStatus'
  /api/system/deposit-monitor/run:
    post:
      summary: Run one automatic deposit monitor cycle now
      responses:
        '200':
          description: Deposit monitor cycle result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    oneOf:
                      - $ref: '#/components/schemas/DepositMonitorCycleResult'
                      - type: object
                        properties:
                          skipped:
                            type: boolean
                          reason:
                            type: string
                  status:
                    $ref: '#/components/schemas/DepositMonitorStatus'
  /api/system/sweep-bot:
    get:
      summary: Get automatic sweep bot status
      responses:
        '200':
          description: Sweep bot status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SweepBotStatus'
  /api/system/sweep-bot/run:
    post:
      summary: Run one automatic sweep bot cycle now
      responses:
        '200':
          description: Sweep bot cycle result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    oneOf:
                      - $ref: '#/components/schemas/SweepBotCycleResult'
                      - type: object
                        properties:
                          skipped:
                            type: boolean
                          reason:
                            type: string
                  status:
                    $ref: '#/components/schemas/SweepBotStatus'
  /api/system/alerts/telegram/test:
    post:
      summary: Send a test Telegram alert
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  maxLength: 2000
                  description: Optional message body to send instead of the default test text.
      responses:
        '200':
          description: Telegram test dispatch result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  telegramEnabled:
                    type: boolean
  /api/system/external-alert-monitor:
    get:
      summary: Get external alert monitor status
      responses:
        '200':
          description: External alert monitor status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalAlertMonitorStatus'
  /api/system/external-alert-monitor/run:
    post:
      summary: Run external alert monitor once
      responses:
        '200':
          description: External alert monitor cycle result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    oneOf:
                      - type: object
                        properties:
                          startedAt:
                            type: string
                          checkedTargets:
                            type: integer
                          alertedEvents:
                            type: integer
                          initializedCursors:
                            type: integer
                      - type: object
                        properties:
                          skipped:
                            type: boolean
                          reason:
                            type: string
                  status:
                    $ref: '#/components/schemas/ExternalAlertMonitorStatus'
  /api/system/runtime-profile:
    post:
      summary: Switch active contract profile for sandbox runtime
      description: Available only when runtime profile switching is enabled by environment configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeProfileRequest'
      responses:
        '200':
          description: Updated system status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/audit-logs:
    get:
      summary: List persisted audit logs
      parameters:
        - in: query
          name: entityType
          required: false
          schema:
            type: string
            enum: [withdrawal, sweep, system]
        - in: query
          name: entityId
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Audit log list
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
  /api/system/withdraw-jobs/external-sync/retry:
    post:
      summary: Requeue foxya withdrawal callback sync jobs for specific withdrawals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [withdrawalIds]
              properties:
                withdrawalIds:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: External sync retry queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      queuedCount:
                        type: integer
                      withdrawalIds:
                        type: array
                        items:
                          type: string
                          format: uuid
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/system/reconciliation:
    get:
      summary: Get internal ledger versus on-chain reconciliation summary
      responses:
        '200':
          description: Reconciliation summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationReport'
  /api/system/sweeps:
    get:
      summary: List planned and executed sweep records
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Sweep list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sweeps:
                    type: array
                    items:
                      $ref: '#/components/schemas/SweepRecord'
  /api/system/sweeps/plan:
    post:
      summary: Plan sweep records from latest monitoring snapshots
      responses:
        '200':
          description: Sweep planning result
          content:
            application/json:
              schema:
                type: object
                properties:
                  plannedCount:
                    type: integer
                  sweeps:
                    type: array
                    items:
                      $ref: '#/components/schemas/SweepRecord'
  /api/system/sweeps/{sweepId}/broadcast:
    post:
      summary: Mark a sweep as broadcasted with manual tx hash
      parameters:
        - in: path
          name: sweepId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SweepTransitionRequest'
      responses:
        '200':
          description: Sweep broadcasted
          content:
            application/json:
              schema:
                type: object
                properties:
                  sweep:
                    $ref: '#/components/schemas/SweepRecord'
  /api/system/sweeps/{sweepId}/confirm:
    post:
      summary: Mark a sweep as confirmed
      parameters:
        - in: path
          name: sweepId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SweepTransitionRequest'
      responses:
        '200':
          description: Sweep confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  sweep:
                    $ref: '#/components/schemas/SweepRecord'
  /api/onchain/networks/{network}/wallets/{address}/balance:
    get:
      summary: Lookup on-chain TRX and KORI balance for any address on mainnet or testnet
      parameters:
        - in: path
          name: network
          required: true
          schema:
            type: string
            enum: [mainnet, testnet]
        - in: path
          name: address
          required: true
          schema:
            type: string
            pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
      responses:
        '200':
          description: On-chain balance lookup response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnchainBalanceResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/onchain/networks/{network}/transfers:
    post:
      summary: Send KORI directly from hot wallet on the selected network
      parameters:
        - in: path
          name: network
          required: true
          schema:
            type: string
            enum: [mainnet, testnet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnchainTransferRequest'
      responses:
        '201':
          description: On-chain hot wallet transfer accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnchainTransferResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/deposits/scan:
    post:
      summary: Process detected deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositScanRequest'
      responses:
        '201':
          description: Created
        '200':
          description: Duplicate request
        '202':
          description: Ignored because destination wallet is not tracked
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/wallets/address-binding:
    post:
      summary: Bind a wallet address to a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletBindingRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  binding:
                    $ref: '#/components/schemas/WalletBinding'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
    get:
      summary: Lookup wallet binding by userId or walletAddress
      parameters:
        - in: query
          name: userId
          required: false
          schema:
            type: string
        - in: query
          name: walletAddress
          required: false
          schema:
            type: string
            pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
      responses:
        '200':
          description: Wallet binding lookup response
          content:
            application/json:
              schema:
                type: object
                properties:
                  binding:
                    oneOf:
                      - $ref: '#/components/schemas/WalletBinding'
                      - type: 'null'
  /api/wallets/balance:
    get:
      summary: Get wallet balance by userId or walletAddress
      parameters:
        - in: query
          name: userId
          required: false
          schema:
            type: string
        - in: query
          name: walletAddress
          required: false
          schema:
            type: string
            pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
      responses:
        '200':
          description: Balance response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/wallets/{userId}/balance:
    get:
      summary: Get wallet balance by userId path
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Balance response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
  /api/wallets/{userId}/address:
    get:
      summary: Get bound wallet address by userId
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wallet address response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  walletAddress:
                    type: string
                    nullable: true
  /api/wallets/transfer:
    post:
      summary: Internal transfer
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalTransferRequest'
      responses:
        '201':
          description: Created
        '200':
          description: Duplicate request
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals:
    post:
      summary: Create withdrawal request
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
        - in: header
          name: X-Internal-Api-Key
          required: false
          schema:
            type: string
          description: Required when withdraw request API key protection is enabled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawRequest'
      responses:
        '201':
          description: Created
        '200':
          description: Duplicate request
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/{withdrawalId}:
    get:
      summary: Get withdrawal status
      parameters:
        - in: path
          name: withdrawalId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Withdrawal response
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawal:
                    $ref: '#/components/schemas/Withdrawal'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/pending-approvals:
    get:
      summary: List withdrawals waiting for admin approvals
      responses:
        '200':
          description: Pending approval withdrawals
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawals:
                    type: array
                    items:
                      $ref: '#/components/schemas/Withdrawal'
  /api/withdrawals/{withdrawalId}/approve:
    post:
      summary: Approve withdrawal
      parameters:
        - in: path
          name: withdrawalId
          required: true
          schema:
            type: string
        - in: header
          name: X-Internal-Api-Key
          required: false
          schema:
            type: string
          description: Required when withdraw admin API key protection is enabled.
        - in: header
          name: X-Admin-Id
          required: false
          schema:
            type: string
          description: Optional actor identifier. Overrides request body adminId when present.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveWithdrawalRequest'
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval:
                    $ref: '#/components/schemas/WithdrawalApproval'
                  withdrawal:
                    $ref: '#/components/schemas/Withdrawal'
                  finalized:
                    type: boolean
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/{withdrawalId}/external-auth/confirm:
    post:
      summary: Confirm external withdrawal authentication
      parameters:
        - in: path
          name: withdrawalId
          required: true
          schema:
            type: string
        - in: header
          name: X-Internal-Api-Key
          required: false
          schema:
            type: string
          description: Required when withdraw admin API key protection is enabled.
        - in: header
          name: X-Actor-Id
          required: false
          schema:
            type: string
          description: Optional actor identifier. Overrides request body actorId when present.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawExternalAuthConfirmRequest'
      responses:
        '200':
          description: External auth confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawal:
                    $ref: '#/components/schemas/Withdrawal'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/{withdrawalId}/broadcast:
    post:
      summary: Broadcast approved withdrawal to TRON
      parameters:
        - in: path
          name: withdrawalId
          required: true
          schema:
            type: string
        - in: header
          name: X-Internal-Api-Key
          required: false
          schema:
            type: string
          description: Required when withdraw admin API key protection is enabled.
      responses:
        '200':
          description: Broadcasted
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawal:
                    $ref: '#/components/schemas/Withdrawal'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/{withdrawalId}/confirm:
    post:
      summary: Confirm broadcasted withdrawal
      parameters:
        - in: path
          name: withdrawalId
          required: true
          schema:
            type: string
        - in: header
          name: X-Internal-Api-Key
          required: false
          schema:
            type: string
          description: Required when withdraw admin API key protection is enabled.
      responses:
        '200':
          description: Confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawal:
                    $ref: '#/components/schemas/Withdrawal'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/{withdrawalId}/approvals:
    get:
      summary: List approval records for a withdrawal
      parameters:
        - in: path
          name: withdrawalId
          required: true
          schema:
            type: string
        - in: header
          name: X-Internal-Api-Key
          required: false
          schema:
            type: string
          description: Required when withdraw admin API key protection is enabled.
      responses:
        '200':
          description: Withdrawal approvals
          content:
            application/json:
              schema:
                type: object
                properties:
                  approvals:
                    type: array
                    items:
                      $ref: '#/components/schemas/WithdrawalApproval'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/policies/addresses:
    get:
      summary: List withdrawal destination address policies
      parameters:
        - in: header
          name: X-Internal-Api-Key
          required: false
          schema:
            type: string
          description: Required when withdraw admin API key protection is enabled.
        - in: query
          name: address
          required: false
          schema:
            type: string
            pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        - in: query
          name: policyType
          required: false
          schema:
            $ref: '#/components/schemas/WithdrawAddressPolicyType'
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Withdrawal address policies
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies:
                    type: array
                    items:
                      $ref: '#/components/schemas/WithdrawalAddressPolicy'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    post:
      summary: Create or update a withdrawal destination address policy
      parameters:
        - in: header
          name: X-Internal-Api-Key
          required: false
          schema:
            type: string
          description: Required when withdraw admin API key protection is enabled.
        - in: header
          name: X-Admin-Id
          required: false
          schema:
            type: string
          description: Optional actor identifier used as createdBy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawAddressPolicyUpsertRequest'
      responses:
        '201':
          description: Address policy upserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy:
                    $ref: '#/components/schemas/WithdrawalAddressPolicy'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/policies/addresses/{address}/{policyType}:
    delete:
      summary: Delete a withdrawal destination address policy
      parameters:
        - in: header
          name: X-Internal-Api-Key
          required: false
          schema:
            type: string
          description: Required when withdraw admin API key protection is enabled.
        - in: path
          name: address
          required: true
          schema:
            type: string
            pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        - in: path
          name: policyType
          required: true
          schema:
            $ref: '#/components/schemas/WithdrawAddressPolicyType'
      responses:
        '200':
          description: Address policy deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/scheduler/retry-pending:
    post:
      summary: Retry or reconcile pending withdrawals
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                timeoutSec:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Scheduler result
  /api/scheduler/process-withdraw-queue:
    post:
      summary: Process low-risk auto-approvals and queue manual reviews
      responses:
        '200':
          description: Queue processing result
          content:
            application/json:
              schema:
                type: object
                properties:
                  pendingCount:
                    type: integer
                  autoApproved:
                    type: integer
                  reviewQueued:
                    type: integer
components:
  responses:
    ErrorResponse:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    DepositScanRequest:
      type: object
      required: [txHash, toAddress, amount, blockNumber]
      properties:
        userId:
          type: string
        walletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        txHash:
          type: string
        toAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        amount:
          type: number
          minimum: 0
        blockNumber:
          type: integer
          minimum: 0
    InternalTransferRequest:
      type: object
      required: [amount]
      properties:
        fromUserId:
          type: string
        fromWalletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        toUserId:
          type: string
        toWalletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        amount:
          type: number
          minimum: 0
    WithdrawRequest:
      type: object
      required: [amount, toAddress]
      anyOf:
        - required: [userId]
        - required: [walletAddress]
      properties:
        userId:
          type: string
        walletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        amount:
          type: number
          exclusiveMinimum: 0
        toAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        clientIp:
          type: string
          maxLength: 64
        deviceId:
          type: string
          maxLength: 128
    ApproveWithdrawalRequest:
      type: object
