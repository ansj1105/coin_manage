components:
  responses:
    ErrorResponse:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    WithdrawAdminApiKey:
      type: apiKey
      in: header
      name: X-Admin-Api-Key
  schemas:
    DepositScanRequest:
      type: object
      required: [txHash, toAddress, amount, blockNumber]
      properties:
        userId:
          type: string
        walletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        txHash:
          type: string
        toAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        amount:
          type: number
          minimum: 0
        blockNumber:
          type: integer
          minimum: 0
    InternalTransferRequest:
      type: object
      required: [amount]
      properties:
        fromUserId:
          type: string
        fromWalletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        toUserId:
          type: string
        toWalletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        amount:
          type: number
          minimum: 0
    WithdrawRequest:
      type: object
      required: [amount, toAddress]
      anyOf:
        - required: [userId]
        - required: [walletAddress]
      properties:
        userId:
          type: string
        walletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        amount:
          type: number
          exclusiveMinimum: 0
        toAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        clientIp:
          type: string
          maxLength: 64
        deviceId:
          type: string
          maxLength: 128
    ApproveWithdrawalRequest:
      type: object
      properties:
        adminId:
          type: string
        note:
          type: string
          maxLength: 500
    WithdrawExternalAuthConfirmRequest:
      type: object
      required: [provider, requestId]
      properties:
        provider:
          type: string
          minLength: 1
          maxLength: 64
        requestId:
          type: string
          minLength: 1
          maxLength: 128
        actorId:
          type: string
          minLength: 1
          maxLength: 64
    WithdrawOfflineSubmitRequest:
      type: object
      required: [txHash]
      properties:
        txHash:
          type: string
          minLength: 8
          maxLength: 128
        note:
          type: string
          maxLength: 500
        actorId:
          type: string
          minLength: 1
          maxLength: 64
    WithdrawApprovalReasonCode:
      type: string
      enum: [manual_review_passed, high_value_verified, trusted_destination_verified, account_activity_verified, ops_override]
    WithdrawAddressPolicyType:
      type: string
      enum: [blacklist, whitelist, internal_blocked]
    WithdrawAddressPolicyUpsertRequest:
      type: object
      required: [address, policyType]
      properties:
        address:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        policyType:
          $ref: '#/components/schemas/WithdrawAddressPolicyType'
        reason:
          type: string
          maxLength: 500
    WithdrawalAddressPolicy:
      type: object
      properties:
        address:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        policyType:
          $ref: '#/components/schemas/WithdrawAddressPolicyType'
        reason:
          type: string
          nullable: true
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Withdrawal:
      type: object
      properties:
        withdrawalId:
          type: string
        userId:
          type: string
        amount:
          type: string
        toAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        status:
          type: string
          enum: [LEDGER_RESERVED, PENDING_ADMIN, ADMIN_APPROVED, TX_BROADCASTED, COMPLETED, FAILED, REJECTED]
        displayStatus:
          type: string
          enum: [submitted, under_review, approved, sending, completed, failed, rejected]
        txHash:
          type: string
          nullable: true
        idempotencyKey:
          type: string
        ledgerTxId:
          type: string
        createdAt:
          type: string
          format: date-time
        approvedAt:
          type: string
          format: date-time
          nullable: true
        broadcastedAt:
          type: string
          format: date-time
          nullable: true
        confirmedAt:
          type: string
          format: date-time
          nullable: true
        failedAt:
          type: string
          format: date-time
          nullable: true
        failReason:
          type: string
          nullable: true
        riskLevel:
          type: string
          enum: [low, medium, high]
        riskScore:
          type: integer
        riskFlags:
          type: array
          items:
            type: string
        requiredApprovals:
          type: integer
        approvalCount:
          type: integer
        clientIp:
          type: string
          nullable: true
        deviceId:
          type: string
          nullable: true
        reviewRequiredAt:
          type: string
          format: date-time
          nullable: true
    WithdrawalApproval:
      type: object
      properties:
        approvalId:
          type: string
        withdrawalId:
          type: string
        adminId:
          type: string
        actorType:
          type: string
          enum: [admin, system]
        reasonCode:
          $ref: '#/components/schemas/WithdrawApprovalReasonCode'
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    WithdrawBridgeStateResponse:
      type: object
      required: [schemaVersion, withdrawalId, externalTransferId, status, txHash, failedReason, updatedAt]
      properties:
        schemaVersion:
          type: string
          enum: ['1.0.0']
        withdrawalId:
          type: string
        externalTransferId:
          type: string
          nullable: true
        status:
          type: string
          enum: [PROCESSING, SENT, COMPLETED, FAILED]
        txHash:
          type: string
          nullable: true
        failedReason:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
    AuditLog:
      type: object
      properties:
        auditId:
          type: string
        entityType:
          type: string
          enum: [withdrawal, sweep, system]
        entityId:
          type: string
        action:
          type: string
        actorType:
          type: string
          enum: [admin, system, user]
        actorId:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time
    WithdrawApproveRequest:
      type: object
      properties:
        adminId:
          type: string
        reasonCode:
          $ref: '#/components/schemas/WithdrawApprovalReasonCode'
        note:
          type: string
          maxLength: 500
    WithdrawAddressPolicy:
      type: object
      properties:
        address:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        policyType:
          type: string
          enum: [blacklist, whitelist, internal_blocked]
        reason:
          type: string
          nullable: true
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    WithdrawAddressPolicyUpsertRequest:
      type: object
      required: [address, policyType]
      properties:
        address:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        policyType:
          type: string
          enum: [blacklist, whitelist, internal_blocked]
        reason:
          type: string
          maxLength: 500
    WithdrawRiskEvent:
      type: object
      properties:
        eventId:
          type: string
        address:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        signal:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        reason:
          type: string
        createdAt:
          type: string
          format: date-time
        actorId:
          type: string
        blacklistPolicyType:
          oneOf:
            - type: string
              enum: [blacklist, whitelist, internal_blocked]
            - type: 'null'
    WithdrawRiskEventCreateRequest:
      type: object
      required: [address, signal, severity, reason]
      properties:
        address:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        signal:
          type: string
          minLength: 1
          maxLength: 100
        severity:
          type: string
          enum: [low, medium, high, critical]
        reason:
          type: string
          minLength: 1
          maxLength: 500
        blacklistPolicyType:
          type: string
          enum: [blacklist, whitelist, internal_blocked]
        actorId:
          type: string
          minLength: 1
          maxLength: 64
    SweepTransitionRequest:
      type: object
      properties:
        txHash:
          type: string
        note:
          type: string
    SweepRecord:
      type: object
      properties:
        sweepId:
          type: string
        sourceWalletCode:
          type: string
        sourceAddress:
          type: string
        targetAddress:
          type: string
        amount:
          type: string
        status:
          type: string
          enum: [planned, broadcasted, confirmed, failed, skipped]
        externalRef:
          type: string
          nullable: true
        txHash:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        broadcastedAt:
