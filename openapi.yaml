openapi: 3.1.0
info:
  title: KORION KORI Backend API
  version: 0.1.0
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/system/status:
    get:
      summary: Get runtime status and configured wallet summary
      responses:
        '200':
          description: System status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
  /api/system/runtime-profile:
    post:
      summary: Switch active contract profile for sandbox runtime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeProfileRequest'
      responses:
        '200':
          description: Updated system status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
  /api/deposits/scan:
    post:
      summary: Process detected deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositScanRequest'
      responses:
        '201':
          description: Created
        '200':
          description: Duplicate request
        '202':
          description: Ignored because destination wallet is not tracked
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/wallets/address-binding:
    post:
      summary: Bind a wallet address to a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletBindingRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  binding:
                    $ref: '#/components/schemas/WalletBinding'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
    get:
      summary: Lookup wallet binding by userId or walletAddress
      parameters:
        - in: query
          name: userId
          required: false
          schema:
            type: string
        - in: query
          name: walletAddress
          required: false
          schema:
            type: string
            pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
      responses:
        '200':
          description: Wallet binding lookup response
          content:
            application/json:
              schema:
                type: object
                properties:
                  binding:
                    oneOf:
                      - $ref: '#/components/schemas/WalletBinding'
                      - type: 'null'
  /api/wallets/balance:
    get:
      summary: Get wallet balance by userId or walletAddress
      parameters:
        - in: query
          name: userId
          required: false
          schema:
            type: string
        - in: query
          name: walletAddress
          required: false
          schema:
            type: string
            pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
      responses:
        '200':
          description: Balance response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/wallets/{userId}/balance:
    get:
      summary: Get wallet balance by userId path
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Balance response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
  /api/wallets/{userId}/address:
    get:
      summary: Get bound wallet address by userId
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wallet address response
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  walletAddress:
                    type: string
                    nullable: true
  /api/wallets/transfer:
    post:
      summary: Internal transfer
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalTransferRequest'
      responses:
        '201':
          description: Created
        '200':
          description: Duplicate request
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals:
    post:
      summary: Create withdrawal request
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawRequest'
      responses:
        '201':
          description: Created
        '200':
          description: Duplicate request
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/{withdrawalId}:
    get:
      summary: Get withdrawal status
      parameters:
        - in: path
          name: withdrawalId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Withdrawal response
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/{withdrawalId}/approve:
    post:
      summary: Approve withdrawal
      parameters:
        - in: path
          name: withdrawalId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approved
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/{withdrawalId}/broadcast:
    post:
      summary: Broadcast approved withdrawal to TRON
      parameters:
        - in: path
          name: withdrawalId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Broadcasted
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/withdrawals/{withdrawalId}/confirm:
    post:
      summary: Confirm broadcasted withdrawal
      parameters:
        - in: path
          name: withdrawalId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Confirmed
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/scheduler/retry-pending:
    post:
      summary: Retry or reconcile pending withdrawals
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                timeoutSec:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Scheduler result
components:
  responses:
    ErrorResponse:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    DepositScanRequest:
      type: object
      required: [txHash, toAddress, amount, blockNumber]
      properties:
        userId:
          type: string
        walletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        txHash:
          type: string
        toAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        amount:
          type: number
          minimum: 0
        blockNumber:
          type: integer
          minimum: 0
    InternalTransferRequest:
      type: object
      required: [amount]
      properties:
        fromUserId:
          type: string
        fromWalletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        toUserId:
          type: string
        toWalletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        amount:
          type: number
          minimum: 0
    WithdrawRequest:
      type: object
      required: [amount, toAddress]
      properties:
        userId:
          type: string
        walletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        amount:
          type: number
          minimum: 0
        toAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
    WalletBindingRequest:
      type: object
      required: [userId, walletAddress]
      properties:
        userId:
          type: string
        walletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
    WalletBinding:
      type: object
      properties:
        userId:
          type: string
        walletAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        createdAt:
          type: string
          format: date-time
    SystemWallet:
      type: object
      properties:
        code:
          type: string
          enum: [treasury, cold, liquidity, reward, marketing, hot]
        label:
          type: string
        address:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
        custody:
          type: string
          enum: [multisig, general]
        allocationPercent:
          type: number
          nullable: true
        allocationUnits:
          type: number
          nullable: true
        allocationLabel:
          type: string
        notes:
          type: string
        flowTags:
          type: array
          items:
            type: string
    BalanceResponse:
      type: object
      properties:
        userId:
          type: string
        walletAddress:
          type: string
          nullable: true
        balance:
          type: string
        lockedBalance:
          type: string
        updatedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              nullable: true
    RuntimeProfileRequest:
      type: object
      required: [profile]
      properties:
        profile:
          type: string
          enum: [runtime, mainnet, testnet, custom]
        customContractAddress:
          type: string
          pattern: '^T[1-9A-HJ-NP-Za-km-z]{33}$'
    SystemStatusResponse:
      type: object
      properties:
        service:
          type: object
          properties:
            name:
              type: string
            nodeEnv:
              type: string
            port:
              type: integer
        runtime:
          type: object
          properties:
            ledgerProvider:
              type: string
            tronGatewayMode:
              type: string
            tronApiUrl:
              type: string
            tronApiKeyConfigured:
              type: boolean
            koriTokenContractConfigured:
              type: boolean
            schedulerPendingTimeoutSec:
              type: integer
        limits:
          type: object
          properties:
            withdrawSingleLimitKori:
              type: number
            withdrawDailyLimitKori:
              type: number
            tronFeeLimitSun:
              type: integer
        wallets:
          type: object
          properties:
            treasury:
              type: string
            deposits:
              type: array
              items:
                type: string
            hot:
              type: string
            tracked:
              type: array
              items:
                type: string
            catalog:
              type: array
              items:
                $ref: '#/components/schemas/SystemWallet'
        contracts:
          type: object
          properties:
            activeProfile:
              type: string
              enum: [runtime, mainnet, testnet, custom]
            runtimeDefaultContractAddress:
              type: string
              nullable: true
            activeContractAddress:
              type: string
              nullable: true
            runtimeEditable:
              type: boolean
            profiles:
              type: object
              properties:
                mainnet:
                  type: string
                testnet:
                  type: string
        database:
          type: object
          properties:
            host:
              type: string
            port:
              type: integer
            name:
              type: string
            schema:
              type: string
        security:
          type: object
          properties:
            jwtConfigured:
              type: boolean
            hotWalletPrivateKeyConfigured:
              type: boolean
