services:
  postgres:
    image: postgres:16-alpine
    container_name: korion-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-korion}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-korion}
      POSTGRES_DB: ${DB_NAME:-korion}
    ports:
      - '${DB_BIND_ADDRESS:-127.0.0.1}:${DB_HOST_PORT:-15432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-korion} -d ${DB_NAME:-korion}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default

  flyway:
    image: flyway/flyway:10.20.1
    container_name: korion-flyway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-korion}
      FLYWAY_USER: ${DB_USER:-korion}
      FLYWAY_PASSWORD: ${DB_PASSWORD:-korion}
      FLYWAY_SCHEMAS: ${DB_SCHEMA:-public}
      FLYWAY_CONNECT_RETRIES: 10
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    command: ["migrate"]
    restart: "no"
    volumes:
      - ./flyway/sql:/flyway/sql:ro
    networks:
      - default

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: korion-app
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      LEDGER_PROVIDER: ${APP_LEDGER_PROVIDER:-postgres}
      TRON_GATEWAY_MODE: ${APP_TRON_GATEWAY_MODE:-mock}
      ALLOW_RUNTIME_PROFILE_SWITCHING: ${APP_ALLOW_RUNTIME_PROFILE_SWITCHING:-}
      ALLOW_SANDBOX_DIRECT_ONCHAIN_SEND: ${APP_ALLOW_SANDBOX_DIRECT_ONCHAIN_SEND:-}
      ALLOW_MAINNET_SANDBOX_DIRECT_ONCHAIN_SEND: ${APP_ALLOW_MAINNET_SANDBOX_DIRECT_ONCHAIN_SEND:-}
      WALLET_MONITOR_ENABLED: ${APP_WALLET_MONITOR_ENABLED:-true}
      WALLET_MONITOR_INTERVAL_SEC: ${APP_WALLET_MONITOR_INTERVAL_SEC:-20}
      WALLET_MONITOR_REQUEST_GAP_MS: ${APP_WALLET_MONITOR_REQUEST_GAP_MS:-1500}
      JWT_SECRET: ${JWT_SECRET:-replace-with-strong-secret}
      TRON_API_URL: ${TRON_API_URL:-https://api.trongrid.io}
      MAINNET_TRON_API_URL: ${MAINNET_TRON_API_URL:-https://api.trongrid.io}
      TESTNET_TRON_API_URL: ${TESTNET_TRON_API_URL:-https://nile.trongrid.io}
      TRON_API_KEY: ${TRON_API_KEY:-}
      KORI_TOKEN_CONTRACT_ADDRESS: ${KORI_TOKEN_CONTRACT_ADDRESS:-}
      MAINNET_KORI_TOKEN_CONTRACT_ADDRESS: ${MAINNET_KORI_TOKEN_CONTRACT_ADDRESS:-TBJZD8RwQ1JcQvEP9BTbPbgBCGxUjxSXnn}
      TESTNET_KORI_TOKEN_CONTRACT_ADDRESS: ${TESTNET_KORI_TOKEN_CONTRACT_ADDRESS:-TPKZnRjJngnxVgxw52pMPSrCp2wGm7iT9W}
      TRON_FEE_LIMIT_SUN: ${TRON_FEE_LIMIT_SUN:-100000000}
      TREASURY_WALLET_ADDRESS: ${TREASURY_WALLET_ADDRESS:-TSM7ocJQHigW9jhk5yFQKrUmBAXz2FFapa}
      DEPOSIT_WALLET_ADDRESSES: ${DEPOSIT_WALLET_ADDRESSES:-TWbuSkkRid1st9gSMy1NhpK1KwJMebHNwh,TLkgBr1vwpkdenM3LZq2hzb33TbCzBYDE3,TCFD5eZAXGdA8ud4ZH2Dt6cZdeGRFYSiaH,TMCUdq7BfaTRCdzUvYmuVoKnjZssYqnJ3s}
      HOT_WALLET_ADDRESS: ${HOT_WALLET_ADDRESS:-replace-with-hot-wallet-address}
      HOT_WALLET_PRIVATE_KEY: ${HOT_WALLET_PRIVATE_KEY:-replace-with-private-key}
      HOT_WALLET_ALERT_MIN_KORI: ${HOT_WALLET_ALERT_MIN_KORI:-1000}
      HOT_WALLET_ALERT_MIN_TRX: ${HOT_WALLET_ALERT_MIN_TRX:-100}
      HOT_WALLET_ALERT_COOLDOWN_SEC: ${HOT_WALLET_ALERT_COOLDOWN_SEC:-21600}
      SWEEP_PLAN_MIN_KORI: ${SWEEP_PLAN_MIN_KORI:-1}
      SWEEP_BOT_ENABLED: ${SWEEP_BOT_ENABLED:-false}
      SWEEP_BOT_POLL_INTERVAL_SEC: ${SWEEP_BOT_POLL_INTERVAL_SEC:-30}
      SWEEP_BOT_CYCLE_LIMIT: ${SWEEP_BOT_CYCLE_LIMIT:-100}
      SWEEP_SOURCE_MIN_TRX: ${SWEEP_SOURCE_MIN_TRX:-50}
      SWEEP_SOURCE_MIN_ENERGY: ${SWEEP_SOURCE_MIN_ENERGY:-35000}
      SWEEP_QUEUE_TIMEOUT_SEC: ${SWEEP_QUEUE_TIMEOUT_SEC:-3600}
      SWEEP_MAX_RETRY_COUNT: ${SWEEP_MAX_RETRY_COUNT:-120}
      DEPOSIT_MONITOR_ENABLED: ${APP_DEPOSIT_MONITOR_ENABLED:-false}
      DEPOSIT_MONITOR_NETWORK: ${APP_DEPOSIT_MONITOR_NETWORK:-mainnet}
      DEPOSIT_MONITOR_POLL_INTERVAL_SEC: ${APP_DEPOSIT_MONITOR_POLL_INTERVAL_SEC:-20}
      DEPOSIT_MONITOR_CONFIRMATIONS: ${APP_DEPOSIT_MONITOR_CONFIRMATIONS:-20}
      DEPOSIT_MONITOR_START_TIMESTAMP_MS: ${APP_DEPOSIT_MONITOR_START_TIMESTAMP_MS:-}
      DEPOSIT_MONITOR_LOOKBACK_MS: ${APP_DEPOSIT_MONITOR_LOOKBACK_MS:-300000}
      DEPOSIT_MONITOR_PAGE_LIMIT: ${APP_DEPOSIT_MONITOR_PAGE_LIMIT:-200}
      DEPOSIT_MONITOR_CURRENCY_IDS: ${APP_DEPOSIT_MONITOR_CURRENCY_IDS:-}
      FOXYA_INTERNAL_API_URL: ${FOXYA_INTERNAL_API_URL:-}
      FOXYA_INTERNAL_API_KEY: ${FOXYA_INTERNAL_API_KEY:-}
      FOXYA_DB_HOST: ${FOXYA_DB_HOST:-}
      FOXYA_DB_PORT: ${FOXYA_DB_PORT:-5432}
      FOXYA_DB_NAME: ${FOXYA_DB_NAME:-}
      FOXYA_DB_USER: ${FOXYA_DB_USER:-}
      FOXYA_DB_PASSWORD: ${FOXYA_DB_PASSWORD:-}
      FOXYA_ENCRYPTION_KEY: ${FOXYA_ENCRYPTION_KEY:-}
      ALERT_MONITOR_ENABLED: ${ALERT_MONITOR_ENABLED:-false}
      ALERT_MONITOR_POLL_INTERVAL_SEC: ${ALERT_MONITOR_POLL_INTERVAL_SEC:-30}
      ALERT_MONITOR_EVENT_LIMIT: ${ALERT_MONITOR_EVENT_LIMIT:-100}
      ALERT_MONITOR_HEALTH_FAILURE_THRESHOLD: ${ALERT_MONITOR_HEALTH_FAILURE_THRESHOLD:-2}
      ALERT_MONITOR_TABLES: ${ALERT_MONITOR_TABLES:-internal_transfers,external_transfers,token_deposits,payment_deposits,swaps,exchanges}
      ALERT_MONITOR_HEALTH_TARGETS: ${ALERT_MONITOR_HEALTH_TARGETS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      VIRTUAL_WALLET_ENCRYPTION_KEY: ${VIRTUAL_WALLET_ENCRYPTION_KEY:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-korion}
      DB_USER: ${DB_USER:-korion}
      DB_PASSWORD: ${DB_PASSWORD:-korion}
      DB_SCHEMA: ${DB_SCHEMA:-public}
      WITHDRAW_SINGLE_LIMIT_KORI: ${WITHDRAW_SINGLE_LIMIT_KORI:-10000}
      WITHDRAW_DAILY_LIMIT_KORI: ${WITHDRAW_DAILY_LIMIT_KORI:-50000}
      SCHEDULER_PENDING_TIMEOUT_SEC: ${SCHEDULER_PENDING_TIMEOUT_SEC:-60}
    ports:
      - "${APP_BIND_ADDRESS:-0.0.0.0}:${APP_PORT:-3000}:3000"
    networks:
      - default
      - shared-foxya
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  shared-foxya:
    external: true
    name: ${SHARED_DOCKER_NETWORK_NAME:-fox_coin_foxya-network}
